<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor" class="logo-icon">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2z"/>
        </svg>
      </div>
      <h2>Login</h2>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <mat-icon class="input-icon">person_outline</mat-icon>
        <input type="email" placeholder="E-mail" class="input-field" formControlName="email" />
      </div>

      <div class="input-group">
        <mat-icon class="input-icon">lock_outline</mat-icon>
        <input [type]="hidePassword ? 'password' : 'text'" placeholder="Senha" class="input-field" formControlName="senha" />
        </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">
        Entrar
      </button>

      <a href="#" class="forgot-password">Esqueceu sua senha?</a>
    </form>
  </div>
</div>
