<div class="clients-container">
  <div class="header-section">
    <h2>Clientes</h2>
    <button mat-raised-button color="primary" routerLink="/clients/new">
      <mat-icon>add</mat-icon>
      Adicionar
    </button>
  </div>

  <mat-card class="clients-table-card">
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef> Nome </th>
          <td mat-cell *matCellDef="let client"> {{ client.nome }} </td>
        </ng-container>

        <ng-container matColumnDef="cnpj">
          <th mat-header-cell *matHeaderCellDef> CNPJ </th>
          <td mat-cell *matCellDef="let client"> {{ client.cnpj }} </td>
        </ng-container>

        <ng-container matColumnDef="contatoPrincipal">
          <th mat-header-cell *matHeaderCellDef> Contato Principal </th>
          <td mat-cell *matCellDef="let client"> {{ client.contatoPrincipal }} </td>
        </ng-container>

        <ng-container matColumnDef="emailContato">
          <th mat-header-cell *matHeaderCellDef> E-mail Contato </th>
          <td mat-cell *matCellDef="let client"> {{ client.emailContato }} </td>
        </ng-container>

        <ng-container matColumnDef="telefoneContato">
          <th mat-header-cell *matHeaderCellDef> Telefone Contato </th>
          <td mat-cell *matCellDef="let client"> {{ client.telefoneContato }} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let client">
            <span class="status-chip" [ngClass]="getStatusClass(client.status)">
              {{ client.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let client">
            <button mat-icon-button [routerLink]="['/clients/edit', client.id]" color="primary">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="deleteClient(client)" color="warn">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
