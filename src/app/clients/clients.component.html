<div class="clients-container">
  <!-- Cabeçalho -->
  <div class="header-section">
    <h2>Clientes</h2>
    <button mat-raised-button color="primary" routerLink="/clients/new">
      <mat-icon>add</mat-icon>
      Adicionar
    </button>
  </div>

  <!-- Card da Tabela -->
  <mat-card class="clients-table-card">
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2">

        <!-- Coluna Nome -->
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome </th>
          <td mat-cell *matCellDef="let client"> {{ client.nome }} </td>
        </ng-container>

        <!-- Coluna CNPJ -->
        <ng-container matColumnDef="cnpj">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> CNPJ </th>
          <td mat-cell *matCellDef="let client"> {{ client.cnpj }} </td>
        </ng-container>

        <!-- Coluna Status -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let client">
            <mat-slide-toggle
  [checked]="client.ativo"
  (change)="toggleStatus(client)">
  {{ client.ativo ? 'Ativo' : 'Inativo' }}
</mat-slide-toggle>
          </td>
        </ng-container>

        <!-- Coluna Ações -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Ações </th>
          <td mat-cell *matCellDef="let client">
            <button mat-icon-button [routerLink]="['/clients/edit', client.id]" color="primary">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="deleteClient(client)" color="warn">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Header e Linhas -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <!-- Paginação -->
      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card>
</div>
