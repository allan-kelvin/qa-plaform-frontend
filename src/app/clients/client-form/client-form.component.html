<div class="client-form-container">
  <div class="header-section">
    <button mat-icon-button (click)="onCancel()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>{{ isEditMode ? 'Editar Cliente' : 'Novo Cliente' }}</h2>
  </div>

  <mat-card class="client-form-card">
    <form [formGroup]="clientForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Nome da Empresa</mat-label>
          <input matInput formControlName="nome" required>
          <mat-error *ngIf="clientForm.get('nome')?.hasError('required')">
            Nome da empresa é obrigatório.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>CNPJ</mat-label>
          <input matInput formControlName="cnpj" placeholder="00.000.000/0000-00" required>
          <mat-error *ngIf="clientForm.get('cnpj')?.hasError('required')">
            CNPJ é obrigatório.
          </mat-error>
          <mat-error *ngIf="clientForm.get('cnpj')?.hasError('pattern')">
            Formato de CNPJ inválido.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Status</mat-label>
          <mat-select formControlName="ativo" required>
            <mat-option [value]="true">Ativo</mat-option>
            <mat-option [value]="false">Inativo</mat-option>
          </mat-select>
          <mat-error *ngIf="clientForm.get('ativo')?.hasError('required')">
            Status é obrigatório.
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-stroked-button type="button" (click)="onCancel()">Cancelar</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="clientForm.invalid">
          {{ isEditMode ? 'Salvar Alterações' : 'Cadastrar Cliente' }}
        </button>
      </div>
    </form>
  </mat-card>
</div>
