<div class="users-page-container">
  <mat-card class="users-card">
    <mat-card-header class="users-card-header">
      <mat-card-title class="page-title">Usuários</mat-card-title>
      <button mat-raised-button color="primary" class="add-button" (click)="openUserForm()">
        <mat-icon>add</mat-icon>
        Adicionar
      </button>
    </mat-card-header>
    <mat-card-content class="users-table-content">
      <div class="mat-elevation-z2 user-table-wrapper"> <mat-table [dataSource]="dataSource" matSort>

          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome </th>
            <td mat-cell *matCellDef="let user">
              <div class="user-info">
                <span class="user-name">{{user.nome}}</span>
                <span class="user-email">{{user.email}}</span>
              </div>
            </td>
          </ng-container>

          <ng-container matColumnDef="cargo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Cargo </th>
            <td mat-cell *matCellDef="let user"> {{user.cargo}} </td>
          </ng-container>

          <ng-container matColumnDef="permissoes">
            <th mat-header-cell *matHeaderCellDef> Permissões </th>
            <td mat-cell *matCellDef="let user">
              <button mat-button class="permission-action-button" color="primary" (click)="openUserForm(user)">Editar</button>
              <button mat-button class="permission-action-button" color="warn" (click)="deleteUser(user)">Excluir</button>
              </td>
          </ng-container>

          <ng-container matColumnDef="ativo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Ativo </th>
            <td mat-cell *matCellDef="let user" class="active-toggle-cell">
              <mat-slide-toggle
                [(ngModel)]="user.ativo"
                (change)="onToggleActive(user)">
              </mat-slide-toggle>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">Nenhum usuário encontrado.</td>
          </tr>
        </mat-table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Selecione a página de usuários"></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
