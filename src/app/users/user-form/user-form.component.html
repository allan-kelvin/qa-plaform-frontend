<h2 mat-dialog-title>{{ isEditMode ? 'Editar Usuário' : 'Novo Usuário' }}</h2>

<mat-dialog-content [formGroup]="userForm">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Nome</mat-label>
    <input matInput formControlName="nome" required>
    <mat-error *ngIf="userForm.get('nome')?.hasError('required') && userForm.get('nome')?.touched">
      Nome é obrigatório.
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>E-mail</mat-label>
    <input matInput formControlName="email" type="email" required>
    <mat-error *ngIf="userForm.get('email')?.hasError('required') && userForm.get('email')?.touched">
      E-mail é obrigatório.
    </mat-error>
    <mat-error *ngIf="userForm.get('email')?.hasError('email') && userForm.get('email')?.touched">
      E-mail inválido.
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width" *ngIf="!isEditMode">
    <mat-label>Senha</mat-label>
    <input matInput formControlName="senha" type="password" required>
    <mat-error *ngIf="userForm.get('senha')?.hasError('required') && userForm.get('senha')?.touched">
      Senha é obrigatória.
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Cargo</mat-label>
    <mat-select formControlName="cargo" required>
      <mat-option *ngFor="let cargo of cargos" [value]="cargo">
        {{ cargo }}
      </mat-option>
    </mat-select>
    <mat-error *ngIf="userForm.get('cargo')?.hasError('required') && userForm.get('cargo')?.touched">
      Cargo é obrigatório.
    </mat-error>
  </mat-form-field>

  <mat-slide-toggle formControlName="ativo">
    Usuário {{ userForm.get('ativo')?.value ? 'Ativo' : 'Inativo' }}
  </mat-slide-toggle>

  </mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="userForm.invalid">
    {{ isEditMode ? 'Salvar Alterações' : 'Adicionar Usuário' }}
  </button>
</mat-dialog-actions>
